<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lean Presentation</title>
    <link rel="stylesheet" href="vendor/reveal/dist/reveal.css">
    <link rel="stylesheet" href="vendor/reveal/dist/theme/white.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="reveal">
      <div class="slides">
{{SLIDES}}
      </div>
    </div>

    <script src="vendor/reveal/dist/reveal.js"></script>
    <script src="vendor/reveal/plugin/markdown/markdown.js"></script>
    <script src="vendor/reveal/plugin/highlight/highlight.js"></script>
    <script>
      const deck = new Reveal({
        hash: true,
        center: false,
        width: "100%",
        height: "100%",
        margin: 0.04,
        scrollActivationWidth: null,
        pdfSeparateFragments: false,
        plugins: [RevealMarkdown, RevealHighlight]
      });

      deck.initialize();
    </script>
  </body>
</html>
