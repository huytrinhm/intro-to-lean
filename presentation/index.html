## Functional core

Typed definitions, inductive data, structural recursion.

--

## Basic commands

### `#check`

```language-lean
#check 1
#check true
```

### `#eval`

```language-lean
#eval 1 + 2
```

- `#check` infers a type.
- `#eval` reduces an expression.
- `(1 + 2 : Nat)` adds a type annotation.

--

## A constant

```language-lean
def hello : String := "Hello"
```

- `def` binds a name.
- `:=` gives its value.
- The type annotation is explicit.

--

## A unary function

```language-lean
def add1 (n : Nat) : Nat := n + 1
```

- `(n : Nat)` declares the parameter type.
- `: Nat` declares the return type.

--

## Multiple parameters

```language-lean
def addTwo (n : Nat) (k : Nat) : Nat := n + k
```

- Each parameter has a type.
- The return type stays explicit.

--

## Inductive data

```language-lean []
inductive Bool where
  | false : Bool
  | true : Bool
```

- Constructors define valid values.
- `Bool` has two cases.

--

## Pattern matching

```language-lean []
def notBool (b : Bool) : Bool :=
  match b with
  | Bool.false => Bool.true
  | Bool.true => Bool.false
```

- Match on constructors.
- Program shape follows data shape.

--

## Inductive naturals

```language-lean []
inductive Nat where
  | zero : Nat
  | succ (n : Nat) : Nat
```

- `Nat` is built from `zero` and `succ`.
- Programs over `Nat` follow those constructors.

--

## Structural recursion

```language-lean []
def double (n : Nat) : Nat :=
  match n with
  | Nat.zero => Nat.zero
  | Nat.succ k => Nat.succ (Nat.succ (double k))
```

- Base case: `Nat.zero`.
- Recursive case: smaller `k`.

--

## Functional core summary

- Typed expressions
- Definitions and functions
- Inductive data and recursion

### Type constructors

```language-lean
List : Type → Type
List Nat
List String
```

## Dependent types

Types can mention values.

--

## Ordinary types lose information

```language-lean
List α → List β → List (α × β)
```

Element types are preserved. Length is not.
<!-- .element: class="subtitle" -->

- Ignore extra data?
- Raise an error?
- Return an `Option`?
- Or make mismatched inputs unrepresentable?

--

## Value-dependent return types

```language-lean
(b : Bool) → if b then Nat else String
```

- Return type depends on `b`.
- The conditional appears in the type.

--

## Pattern matching refines types

```language-lean []
def natOrStringThree (b : Bool) : if b then Nat else String :=
  match b with
  | true => (3 : Nat)
  | false => "three"
```

- Each branch gets a more specific type.
- Values can refine types.

--

## Length-indexed vectors

```language-lean
inductive Vect (α : Type) : Nat → Type where
```

- `Vect α n` is indexed by length `n`.

--

## Base constructor

```language-lean
inductive Vect (α : Type) : Nat → Type where
  | nil : Vect α 0
```

- `nil : Vect α 0`
- Empty vector has length `0`.

--

## Cons updates the index

```language-lean []
inductive Vect (α : Type) : Nat → Type where
  | nil : Vect α 0
  | cons : α → {n : Nat} → Vect α n → Vect α (n + 1)
```

- `cons` maps length `n` to `n + 1`.
- The constructor enforces that change.

--

## `Vect.zip` rules out mismatch

```language-lean []
def Vect.zip : Vect α n → Vect β n → Vect (α × β) n
  | Vect.nil, Vect.nil => Vect.nil
  | Vect.cons x xs, Vect.cons y ys =>
      Vect.cons (x, y) (Vect.zip xs ys)
```

- Both inputs share index `n`.
- No unequal-length branch is needed.

--

## Dependent types summary

- **Ordinary function type**: `Nat → Nat`
- **Type constructor**: `List : Type → Type`
- **Indexed family**: `Vect : Type → Nat → Type`
- **Dependent function**: `(b : Bool) → if b then Nat else String`

Types can track values and invariants.
<!-- .element: class="subtitle" -->

## Proof terms

Propositions in `Prop`, proofs as terms.

--

## `Bool` vs `Prop`

### `Bool`

```language-lean
#check true
#check false
```

Computable truth values.
<!-- .element: class="subtitle" -->

### `Prop`

```language-lean
#check True
#check False
```

Theorem statements.
<!-- .element: class="subtitle" -->

`Bool` computes; `Prop` states claims.
<!-- .element: class="subtitle" -->

--

## A theorem is a type

```language-lean
theorem keepFirst (p q : Prop) (hp : p) (hq : q) : p := ?
```

- Assumptions become inputs.
- Goal: produce a term of type `p`.

--

## A proof term

```language-lean
theorem keepFirst (p q : Prop) (hp : p) (hq : q) : p := hp
```

- `hp` already has type `p`.
- The proof is the term `hp`.

--

## Conjunction as data

```language-lean
#check And.intro
#check And.left
#check And.right
```

- `And.intro` builds `p ∧ q`.
- `And.left` and `And.right` project its components.

--

## Composed proof term

```language-lean
theorem and_commutative (p q : Prop) (hpq : p ∧ q) : q ∧ p :=
  And.intro (And.right hpq) (And.left hpq)
```

- Extract `q`.
- Extract `p`.
- Build `q ∧ p`.

--

## Tactic script

```language-lean []
theorem and_commutative_tactic (p q : Prop) (hpq : p ∧ q) : q ∧ p := by
  apply And.intro
  exact And.right hpq
  exact And.left hpq
```

- `by` starts tactic mode.
- Tactics build the same proof term step by step.

--

## Recursion and induction

### Recursive program on `Nat`

```language-lean []
def f : Nat → ...
  | Nat.zero => ...
  | Nat.succ k => ... f k ...
```

### Induction proof on `Nat`

```language-lean []
theorem h : ∀ n : Nat, P n
  | Nat.zero => ...
  | Nat.succ k => ... h k ...
```

Same inductive structure, different goal.
