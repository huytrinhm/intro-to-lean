# Lean: From Functional Programming to Theorem Proving

One typed core language for programs, types, and proofs.
<!-- .element: class="lead" -->

1. Reject the wrong kind of thing. <!-- .element: class="fragment fade-up" -->
2. Track the right shape, not only the right type. <!-- .element: class="fragment fade-up" -->
3. Check evidence for precise claims. <!-- .element: class="fragment fade-up" -->

---

## One Talk, Three Stages

1. **Functional programming**: expressions, definitions, inductive data, recursion.
2. **Dependent types**: types can remember relationships ordinary types forget.
3. **Proofs as programs**: a theorem is a type, and a proof is evidence for it.

These are three stages of one idea, not three separate topics.
<!-- .element: class="subtitle" -->

---

## What Is Lean?

Lean is a typed core language where programs, types, and proofs all live in the same system.
<!-- .element: class="lead" -->

- Functional programming language
- Interactive theorem prover
- Used for mathematics, software verification, and teaching
- Best understood as a PL story rather than a product tour

## Lean starts from familiar ground
<!-- .element: class="r-fit-text" -->

Before dependent types and proofs, Lean already looks like a typed functional language.

--

## First contact with Lean

### `#check`

```nohighlight
#check 1
#check true
```

### `#eval`

```nohighlight
#eval 1 + 2
```

- `#check` asks for the type of an expression.
- `#eval` asks Lean to compute the expression.
- `(1 + 2 : Nat)` makes the intended type explicit.

--

## Start with a named value

```nohighlight
def hello : String := "Hello"
```

- `def` introduces a name.
- `:=` defines it by the expression on the right.
- Lean records the result type in the environment.

--

## Turn the definition into a function

```nohighlight
def add1 (n : Nat) : Nat := n + 1
```

- `(n : Nat)` introduces an argument.
- The return type is part of the contract.

--

## Multiple parameters are still ordinary typed programming

```nohighlight
def addTwo (n : Nat) (k : Nat) : Nat := n + k
```

- Functions can take several typed inputs.
- Types already describe useful input and output structure.

--

## Data is defined by its constructors

```nohighlight
inductive Bool where
  | false : Bool
  | true : Bool
```

- Constructors describe the legal shapes of values.
- `Bool` has exactly two constructors.

--

## Constructors build data; `match` consumes it

```nohighlight
def notBool (b : Bool) : Bool :=
  match b with
  | Bool.false => Bool.true
  | Bool.true => Bool.false
```

- Pattern matching branches on the constructor that built the value.
- The structure of the program follows the structure of the data.

--

## Natural numbers are inductive too

```nohighlight
inductive Nat where
  | zero : Nat
  | succ (n : Nat) : Nat
```

- `Nat` is built from `zero` and repeated `succ`.
- Recursive data leads naturally to recursive programs.

--

## Recursive programs follow the same shape

```nohighlight
def double (n : Nat) : Nat :=
  match n with
  | Nat.zero => Nat.zero
  | Nat.succ k => Nat.succ (Nat.succ (double k))
```

- Handle the base case `Nat.zero`.
- Recur on the smaller value `k`.

--

## What ordinary types already give us

- Typed expressions with static and dynamic views
- Definitions and function signatures
- Inductive data, pattern matching, and structural recursion

### Type constructors already vary with types

```nohighlight
List : Type → Type
List Nat
List String
```

Next step: can types vary with values too?

## This is where Lean stops feeling ordinary
<!-- .element: class="r-fit-text" -->

Dependent types preserve relationships that ordinary types forget.

--

## Ordinary types are sometimes too weak

```nohighlight
List α → List β → List (α × β)
```

Element types are remembered. Equal length is not.
<!-- .element: class="subtitle" -->

- Ignore extra data?
- Raise an error?
- Return an option?
- Or make mismatched inputs unrepresentable?

--

## A return type can depend on the input value

```nohighlight
(b : Bool) → if b then Nat else String
```

- The result type itself changes with the input value.
- The familiar `if ... then ... else ...` appears inside the type.

--

## Pattern matching refines the type too

```nohighlight
def natOrStringThree (b : Bool) : if b then Nat else String :=
  match b with
  | true => (3 : Nat)
  | false => "three"
```

- Pattern matching chooses a branch at runtime.
- It also sharpens the static type in each branch.
- Values can refine types.

--

## What if a collection remembered its length?

```nohighlight
inductive Vect (α : Type) : Nat → Type where
```

- `Vect α n` is a family of types indexed by a natural number.
- Read it as vectors of `α` with length `n`.

--

## The constructors carry the length story

```nohighlight
inductive Vect (α : Type) : Nat → Type where
  | nil : Vect α 0
```

- `nil` can only build a vector of length `0`.
- The invariant is already visible in the constructor.

--

## Adding one element changes the index too

```nohighlight
inductive Vect (α : Type) : Nat → Type where
  | nil : Vect α 0
  | cons : α → {n : Nat} → Vect α n → Vect α (n + 1)
```

- Adding an element changes the type from length `n` to `n + 1`.
- The constructor enforces that change statically.

--

## `Vect.zip` has no mismatched-length cases

```nohighlight
def Vect.zip : Vect α n → Vect β n → Vect (α × β) n
  | Vect.nil, Vect.nil => Vect.nil
  | Vect.cons x xs, Vect.cons y ys =>
      Vect.cons (x, y) (Vect.zip xs ys)
```

- Both inputs share the same length index `n`.
- Unequal-length branches are not missing by accident.
- A runtime check becomes a compile-time guarantee.

--

## The type checker knows more

- **Ordinary function type**: `Nat → Nat`
- **Type constructor**: `List : Type → Type`
- **Indexed family**: `Vect : Type → Nat → Type`
- **Dependent function**: `(b : Bool) → if b then Nat else String`

Once types express richer invariants, theorem proving stops feeling like an unrelated extra.
<!-- .element: class="subtitle" -->

## Theorem proving is the same story pushed further
<!-- .element: class="r-fit-text" -->

A theorem statement is another typed object inside the same language. A proof is evidence for it.

--

## `Bool` and `Prop` are different

### Boolean values

```nohighlight
#check true
#check false
```

These are values of type `Bool`.
<!-- .element: class="subtitle" -->

### Propositions

```nohighlight
#check True
#check False
```

These live in `Prop`, where theorem statements are expressed.
<!-- .element: class="subtitle" -->

Logic is represented inside the same type-theoretic language.
<!-- .element: class="subtitle" -->

--

## Lean asks for evidence, not persuasion

```nohighlight
theorem keepFirst (p q : Prop) (hp : p) (hq : q) : p := ?
```

- Assume `p`, `q`, `hp : p`, and `hq : q`.
- The goal is to produce a term of type `p`.

--

## The smallest proof looks like returning a value

```nohighlight
theorem keepFirst (p q : Prop) (hp : p) (hq : q) : p := hp
```

- The goal asks for evidence of type `p`.
- `hp` already has that type.
- A proof can be as small as returning the needed value.

--

## Conjunction behaves like structured data

```nohighlight
#check And.intro
#check And.left
#check And.right
```

- `And.intro` builds evidence for `p ∧ q`.
- `And.left` and `And.right` project the two parts back out.
- Proof structure mirrors typed programming structure.

--

## A larger proof is still just composition

```nohighlight
theorem and_commutative (p q : Prop) (hpq : p ∧ q) : q ∧ p :=
  And.intro (And.right hpq) (And.left hpq)
```

- `And.right hpq` extracts the proof of `q`.
- `And.left hpq` extracts the proof of `p`.
- `And.intro` rebuilds them as `q ∧ p`.

--

## The same proof can be built interactively

```nohighlight
theorem and_commutative_tactic (p q : Prop) (hpq : p ∧ q) : q ∧ p := by
  apply And.intro
  exact And.right hpq
  exact And.left hpq
```

- `by` opens tactic mode.
- Lean can guide proof construction step by step.
- The theorem is the same; only the proof style changes.

--

## Recursion and induction have the same shape

### Recursive program on `Nat`

```nohighlight
def f : Nat → ...
  | Nat.zero => ...
  | Nat.succ k => ... f k ...
```

### Induction proof on `Nat`

```nohighlight
theorem h : ∀ n : Nat, P n
  | Nat.zero => ...
  | Nat.succ k => ... h k ...
```

The parallel comes from the same inductive structure introduced in the programming part of the talk.
<!-- .element: class="subtitle" -->

2. Let types track more meaning.
3. Read proofs as programs.

Lean unifies programming, typing, and proving in one language. <!-- .element: class="lead" -->
